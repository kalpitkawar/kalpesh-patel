name: IPO Pulse CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: ipo_pulse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: mysqli, pdo, pdo_mysql
        
    - name: Validate PHP Syntax
      run: |
        find . -name "*.php" -exec php -l {} \;
        
    - name: Setup Database
      run: |
        mysql -h 127.0.0.1 -u root ipo_pulse_test < db_schema.sql
        mysql -h 127.0.0.1 -u root ipo_pulse_test < db_indexes.sql
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: ''
        DB_NAME: ipo_pulse_test
        
    - name: Test API Endpoints
      run: |
        php -S localhost:8000 &
        sleep 2
        curl -f http://localhost:8000/get_ipos.php
        curl -f http://localhost:8000/get_news.php

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Production
      run: |
        echo "Ready for production deployment"
        echo "Configure your hosting provider deployment here"
        # Add your deployment commands here
        # Example: rsync, FTP, or hosting provider CLI