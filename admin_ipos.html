<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage IPOs - IPO Pulse Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>IPO Pulse Admin</h1>
            <nav role="navigation" aria-label="Admin navigation">
                <a href="admin_dashboard.html">Dashboard</a>
                <a href="admin_ipos.html" class="active">Manage IPOs</a>
                <a href="admin_news.html">Manage News</a>
                <a href="index.html">View Site</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="hero" style="margin-bottom:32px;">
            <h2 class="hero-title">Manage IPOs</h2>
            <p class="hero-desc">Add, view, and manage all IPOs from one place. Keep your IPO database up to date for your users.</p>
        </section>
        <form id="add-ipo-form" novalidate>
            <h3 style="margin-bottom:12px;">Add New IPO</h3>
            <label for="name">IPO Name</label>
            <input type="text" id="name" name="name" placeholder="IPO Name" required minlength="2" maxlength="100">
            
            <label for="open_date">Open Date</label>
            <input type="date" id="open_date" name="open_date" required>
            
            <label for="close_date">Close Date</label>
            <input type="date" id="close_date" name="close_date" required>
            
            <label for="price">Price</label>
            <input type="number" id="price" name="price" placeholder="Price" step="0.01" min="0" max="99999" required>
            
            <label for="details">Details</label>
            <textarea id="details" name="details" placeholder="Details" required minlength="10" maxlength="500" rows="4"></textarea>
            
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="closed">Closed</option>
            </select>
            
            <button type="submit">Add IPO</button>
            <div id="add-ipo-msg" role="alert" aria-live="polite" style="margin-top:10px;"></div>
        </form>
        <section id="ipo-list-admin">
            <!-- IPOs will be listed here -->
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2025 IPO Pulse. All rights reserved. | Designed for investors</p>
        </div>
    </footer>
    <script src="admin_ipos.js"></script>
</body>
</html>
