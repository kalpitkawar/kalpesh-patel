<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - IPO Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>IPO Pulse</h1>
            <nav role="navigation" aria-label="Main navigation">
                <a href="index.html">Home</a>
                <a href="news.html">News</a>
            </nav>
        </div>
    </header>
    <main class="container" style="max-width:400px;margin-top:40px;">
        <section class="hero" style="margin-bottom:32px;">
            <h2 class="hero-title">User Login</h2>
            <p class="hero-desc">Login to access your dashboard, track IPOs, and manage alerts.</p>
        </section>
        <form id="login-form" novalidate>
            <label for="login">Email / Mobile / Username</label>
            <input type="text" id="login" name="login" required autofocus autocomplete="username" aria-describedby="login-help">
            <small id="login-help" class="help-text">Enter your email, mobile number, or username</small>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" aria-describedby="password-help">
            <small id="password-help" class="help-text">Enter your account password</small>
            
            <button type="submit">Login</button>
            <div id="login-msg" role="alert" aria-live="polite" style="margin-top:10px;"></div>
        </form>
        <p style="margin-top:18px;">Don't have an account? <a href="register.html">Register here</a></p>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2025 IPO Pulse. All rights reserved. | Designed for investors</p>
        </div>
    </footer>
    <script src="login.js"></script>
</body>
</html>
