<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - IPO Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>IPO Pulse</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="news.html">News</a>
            </nav>
        </div>
    </header>
    <main class="container" style="max-width:400px;margin-top:40px;">
        <section class="hero" style="margin-bottom:32px;">
            <h2 class="hero-title">Create Your Free Account</h2>
            <p class="hero-desc">Register to track IPOs, get alerts, and access exclusive features.</p>
        </section>
        <form id="register-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="mobile">Mobile Number</label>
            <input type="text" id="mobile" name="mobile" required pattern="[0-9]{10,15}" maxlength="15">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Register</button>
            <div id="register-msg" style="margin-top:10px;"></div>
        </form>
        <p style="margin-top:18px;">Already have an account? <a href="login.html">Login here</a></p>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2025 IPO Pulse. All rights reserved. | Designed for investors</p>
        </div>
    </footer>
    <script src="register.js"></script>
</body>
</html>
